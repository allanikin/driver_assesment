<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#005a78"><link rel="manifest" href="manifest.webmanifest">
<title>SRBC Waste Services Driver Assessment</title>
<style>
:root{--blue:#005a78;--dark:#003e54;--pale:#e8f3f7;--line:#d6e0e4;--bg:#f2f5f6;--ink:#17252b}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--ink)}
header{position:sticky;top:0;z-index:20;background:var(--blue);color:#fff;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.brand{display:flex;gap:10px;align-items:center}.logo{width:42px;height:42px;border-radius:10px;background:#fff;color:var(--blue);display:grid;place-items:center;font-weight:900}
h1{font-size:18px;margin:0}small{opacity:.85}.gps{padding:8px 10px;border-radius:999px;background:#ffffff20;font-size:13px}
main{max-width:1100px;margin:auto;padding:16px}.steps{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;margin-bottom:14px}
.step{border:0;border-radius:10px;padding:10px 5px;font-weight:800;background:#dfe7ea}.step.on{background:var(--blue);color:#fff}
.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:17px;margin-bottom:14px;box-shadow:0 3px 12px #0000000d}
h2,h3{margin:0 0 12px}.muted{color:#65757c}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
label{font-size:14px;font-weight:800}input,textarea,select{width:100%;margin-top:5px;padding:12px;border:1px solid #b9c7cd;border-radius:11px;font:inherit;background:#fff}
textarea{min-height:140px}.actions{display:flex;justify-content:flex-end;gap:9px;flex-wrap:wrap;margin-top:14px}
button{font:inherit;cursor:pointer}.btn{border:0;border-radius:11px;padding:12px 15px;font-weight:850;background:#e4eaed}.primary{background:var(--blue);color:#fff}.danger{background:#f9dddd;color:#8b1d1d}
.choices,.ratings{display:flex;gap:8px;flex-wrap:wrap}.choice{border:2px solid var(--line);background:#fff;border-radius:12px;padding:12px 15px;font-weight:800}.choice.sel{border-color:var(--blue);background:var(--pale)}
.check{display:grid;grid-template-columns:1fr auto;align-items:center;gap:10px;padding:11px;border:1px solid var(--line);border-radius:11px;margin-bottom:8px}

.rating{border:0;border-radius:9px;padding:8px}.rating.sel{outline:3px solid #005a7840}
.walkaround-layout{display:grid;grid-template-columns:minmax(300px,42%) 1fr;gap:16px;align-items:start}
.vehicle-panel{position:sticky;top:86px}
.vehicle-diagram{position:relative;border:1px solid var(--line);border-radius:16px;padding:18px;background:linear-gradient(#f9fcfd,#edf5f7);overflow:hidden}
.vehicle-svg{width:100%;height:auto;display:block}
.zone-btn{position:absolute;border:2px solid #fff;background:var(--blue);color:#fff;border-radius:999px;min-width:42px;height:42px;padding:0 11px;font-weight:900;box-shadow:0 3px 10px #0004}
.zone-btn.sel{background:#ffb000;color:#17252b;transform:scale(1.08)}
.zone-btn.done{background:#2e7d32}
.zone-cab{left:12%;top:25%}.zone-front{left:3%;top:54%}.zone-near{left:43%;top:77%}.zone-rear{right:3%;top:54%}.zone-off{left:43%;top:14%}.zone-body{left:57%;top:44%}
.progressbar{height:12px;background:#dfe7ea;border-radius:999px;overflow:hidden;margin:10px 0}.progressfill{height:100%;background:var(--blue);transition:width .2s}
.zone-list{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:12px}.zone-chip{border:1px solid var(--line);background:#fff;border-radius:10px;padding:9px;font-weight:800}.zone-chip.sel{background:var(--pale);border-color:var(--blue)}
.walk-items{display:grid;gap:9px}.walk-item{border:1px solid var(--line);border-radius:13px;background:#fff;overflow:hidden}.walk-item summary{list-style:none;padding:13px;cursor:pointer;display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center}.walk-item summary::-webkit-details-marker{display:none}
.item-no{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;background:#e4eaed;font-weight:900}.item-title{font-weight:900}.item-status{font-size:12px;padding:6px 8px;border-radius:999px;background:#edf1f2;font-weight:850}
.item-body{padding:0 13px 13px}.observe-prompt{padding:10px;border-radius:10px;background:#f2f7f9;margin-bottom:10px}.status-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px}
.status-btn{border:2px solid var(--line);border-radius:11px;padding:11px 8px;background:#fff;font-weight:850}.status-btn.sel{border-color:var(--blue);background:var(--pale)}
.status-btn[data-s="Competent"].sel{background:#e2f3e5;border-color:#2e7d32;color:#245c2a}.status-btn[data-s="Coaching"].sel{background:#fff1cf;border-color:#b7791f;color:#735000}.status-btn[data-s="Omitted"].sel{background:#ffe1c5;border-color:#d65b00;color:#893c00}.status-btn[data-s="Unsatisfactory"].sel{background:#ffdada;border-color:#991b1b;color:#7d1414}.status-btn[data-s="Not applicable"].sel{background:#edf1f2;border-color:#7a8990}
.quick-observations{display:flex;gap:7px;flex-wrap:wrap;margin:9px 0}.quick-observations button{border:1px solid var(--line);border-radius:999px;padding:8px 10px;background:#fff}
.check-summary{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin:12px 0}.check-summary .stat{padding:9px}.check-summary .stat strong{font-size:20px}
@media(max-width:800px){.walkaround-layout{grid-template-columns:1fr}.vehicle-panel{position:static}.zone-list{grid-template-columns:repeat(2,1fr)}.status-grid{grid-template-columns:1fr 1fr}.check-summary{grid-template-columns:repeat(2,1fr)}}

.assess{display:grid;grid-template-columns:220px 1fr;gap:14px}.grades{display:grid;gap:8px}.grade{border:0;color:#fff;border-radius:12px;padding:15px;font-weight:900;text-align:left}
[data-g=Positive]{background:#2e7d32}[data-g=Advisory]{background:#a86f13}[data-g=Minor]{background:#d97706}[data-g=Significant]{background:#c2410c}[data-g=Serious]{background:#991b1b}.grade.sel{outline:4px solid #0002}
.comps{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.comp,.obs{border:2px solid var(--line);background:#fff;border-radius:12px;padding:13px;text-align:left;font-weight:800}.comp.sel{border-color:var(--blue);background:var(--pale)}
.obsopts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.obslist{display:grid;gap:8px}.obscard{border:1px solid var(--line);border-left:6px solid var(--blue);border-radius:11px;padding:11px}
.meta{font-size:12px;color:#65757c;margin-top:5px}.map{height:280px;position:relative;overflow:hidden;border:1px solid var(--line);border-radius:13px;background:linear-gradient(90deg,#dbe7df 1px,transparent 1px),linear-gradient(#dbe7df 1px,transparent 1px),#eef4ef;background-size:30px 30px}
.route{position:absolute;inset:0}.pin{position:absolute;transform:translate(-50%,-50%);width:27px;height:27px;border-radius:50%;background:var(--blue);color:#fff;border:3px solid #fff;display:grid;place-items:center;font-size:12px;font-weight:900}
.tabs{display:flex;gap:7px;overflow:auto;margin-bottom:12px}.tab{border:0;border-radius:999px;padding:10px 13px;font-weight:800}.tab.on{background:var(--blue);color:#fff}.hide{display:none!important}
.guide{display:none;padding:11px;background:#fff7d8;border:1px solid #ead67e;border-radius:11px;margin-top:7px}.guide.open{display:block}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.stat{background:var(--pale);border-radius:12px;padding:12px;text-align:center}.stat strong{display:block;font-size:24px}
.sig{border:2px dashed #9bacb3;border-radius:12px;overflow:hidden}canvas{display:block;width:100%;height:180px;touch-action:none}
.report{width:210mm;min-height:297mm;background:#fff;margin:10px auto;padding:17mm;box-shadow:0 4px 20px #0002}.reporthead{border-bottom:4px solid var(--blue);padding-bottom:10px;margin-bottom:15px;display:flex;justify-content:space-between}.matrix{width:100%;border-collapse:collapse}.matrix th,.matrix td{border:1px solid #cbd5da;padding:7px}.matrix th{background:var(--pale)}
.watermark{position:fixed;left:50%;top:45%;transform:translate(-50%,-50%) rotate(-28deg);font-size:100px;color:#005a7810;font-weight:900}
@media(max-width:800px){.steps{grid-template-columns:repeat(3,1fr)}.grid{grid-template-columns:1fr}.assess{grid-template-columns:1fr}.grades{grid-template-columns:repeat(5,1fr)}.grade{text-align:center;font-size:13px}.comps{grid-template-columns:1fr 1fr}.stats{grid-template-columns:1fr 1fr}.report{width:100%;min-height:auto;padding:18px}}
@media print{header,.steps,.noprint{display:none!important}main{max-width:none;padding:0}.report{box-shadow:none;margin:0;width:100%;page-break-after:always}}
</style></head>
<body>
<header><div class="brand"><div class="logo">SRBC</div><div><h1>Driver Competency Assessment</h1><small>South Ribble Borough Council · Waste Services</small></div></div><div id="gps" class="gps">GPS idle</div></header>
<main><div id="steps" class="steps noprint"></div><div id="screen"></div></main>
<script>
const S=["Details","Eligibility","Checks","Assessment","Report","Signatures"];
const C=["Eyesight","Fitness to drive","Driving licence","Safety checks","Driving position","Acceleration","Braking","Clutch","Gear selection","Steering","Hazard perception","Use of speed","Driving to conditions","Lane discipline","Planning","Mirrors","Signals","Junctions","Road signs","Overtaking","Manoeuvring","Vehicle sympathy","Attitude to road users","Attitude to assessment"];
const O={Mirrors:["Mirror check omitted","Late mirror check","Effective mirror routine"],Planning:["Reactive rather than planned driving","Failed to plan beyond immediate hazard","Good forward planning"],Braking:["Late braking","Harsh braking","Smooth progressive braking"],"Use of speed":["Speed inappropriate for conditions","Exceeded posted limit","Speed well managed"],Junctions:["Approach too fast","Observation incomplete","Junction negotiated safely"],"Safety checks":["Defect missed","Check completed out of sequence","Thorough pre-use inspection"]};
let A=JSON.parse(localStorage.getItem("srbcA")||"null")||{step:0,details:{date:new Date().toISOString().slice(0,10),assessor:"Allan Ikin"},elig:{eyesight:"Pass",fitness:"Fit",licence:"Valid",cpc:"Valid",notes:""},checks:{},grade:null,comp:null,obs:[],route:[],tracking:false,watch:null,start:null,end:null,report:{initial:"",coaching:"",progress:"",summary:"",recommendation:"Competent",comments:""},sig:{},published:false,includeGps:true,includeSpeed:true};
const q=s=>document.querySelector(s), save=()=>localStorage.setItem("srbcA",JSON.stringify(A)), esc=s=>String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));
function go(n){A.step=n;save();render()}function render(){q("#steps").innerHTML=S.map((x,i)=>`<button class="step ${i===A.step?"on":""}" onclick="go(${i})">${x}</button>`).join("");q("#screen").innerHTML=[details,elig,checks,assessment,report,signatures][A.step]();wire()}
function fld(l,k,t="text"){return `<label>${l}<input type="${t}" value="${esc(A.details[k]||"")}" onchange="A.details.${k}=this.value;save()"></label>`}
function details(){return `<div class=card><h2>Assessment details</h2><p class=muted>Set up the driver, assessor and vehicle.</p><div class=grid>${fld("Driver name","driver")}${fld("Employee number","employee")}${fld("Assessor","assessor")}${fld("Date","date","date")}${fld("Vehicle","vehicle")}${fld("Registration","registration")}${fld("Licence number","licence")}${fld("Odometer","odometer","number")}</div><div class=actions><button class=btn onclick=sample()>Load sample</button><button class="btn primary" onclick=go(1)>Continue</button></div></div>`}
function choices(t,k,vals){return `<h3>${t}</h3><div class=choices>${vals.map(v=>`<button class="choice ${A.elig[k]===v?"sel":""}" onclick="A.elig.${k}='${v}';save();render()">${v}</button>`).join("")}</div>`}
function elig(){return `<div class=card><h2>Eligibility</h2>${choices("Eyesight","eyesight",["Pass","Fail","Not completed"])}${choices("Fitness to drive","fitness",["Fit","Not fit","Review"])}${choices("Driving licence","licence",["Valid","Review","Invalid"])}${choices("Driver CPC","cpc",["Valid","Review","Not required"])}<label>Notes<textarea onchange="A.elig.notes=this.value;save()">${esc(A.elig.notes)}</textarea></label><div class=actions><button class=btn onclick=go(0)>Back</button><button class="btn primary" onclick=eligNext()>Continue</button></div></div>`}
function eligNext(){if(A.elig.eyesight==="Fail"||A.elig.fitness==="Not fit"||A.elig.licence==="Invalid")return alert("Assessment cannot continue.");go(2)}
const WALK=[
{id:1,zone:"cab",title:"Front view: mirrors, cameras and glass",prompt:"Did the driver inspect the windscreen, windows, mirrors and camera systems for damage, cleanliness, security and a clear view?",quick:["Completed a systematic visual check","Failed to inspect a mirror or camera","Did not clean an obscured lens","Correctly identified damage"]},
{id:2,zone:"cab",title:"Windscreen wipers and washers",prompt:"Did the driver operate the wipers and washers and confirm effective coverage, blade condition and adequate washer fluid?",quick:["Operated and checked correctly","Did not test washer operation","Missed damaged wiper blade"]},
{id:3,zone:"cab",title:"Dashboard warning lights and gauges",prompt:"Did the driver check warning lamps, gauges and audible warnings during start-up and explain any abnormal indication?",quick:["Completed start-up warning check","Warning light not identified","Gauge check omitted"]},
{id:4,zone:"cab",title:"Steering",prompt:"Did the driver check steering movement, excessive play, assistance and any unusual noise or restriction?",quick:["Steering check completed","Excessive play check omitted","Correctly identified steering concern"]},
{id:5,zone:"cab",title:"Horn",prompt:"Did the driver test the horn and confirm that it operated correctly?",quick:["Horn tested","Horn check omitted"]},
{id:6,zone:"cab",title:"Brakes and air build-up",prompt:"Did the driver demonstrate the correct air-pressure build-up, warning device, footbrake and parking-brake checks without creating risk?",quick:["Brake checks completed methodically","Air warning check omitted","Parking brake check incomplete","Required assessor prompting"]},
{id:7,zone:"cab",title:"Height marker",prompt:"Did the driver locate the vehicle height marker and confirm it matched the vehicle or body configuration?",quick:["Height marker verified","Height not known or checked","Marker did not match vehicle"]},
{id:8,zone:"cab",title:"Seat belts and cab interior",prompt:"Did the driver inspect the seat belt, seat security, cab condition, loose items and safe access to controls?",quick:["Cab interior checked thoroughly","Seat belt check omitted","Loose item not identified"]},
{id:9,zone:"cab",title:"Cab, doors and steps",prompt:"Did the driver inspect cab security, door operation, access steps, handholds and any visible damage?",quick:["Cab and access checked","Step or handhold omitted","Door security not checked"]},
{id:10,zone:"front",title:"Lights and indicators",prompt:"Did the driver check all relevant lamps, indicators, beacons and work lights using a suitable method or assistant where needed?",quick:["All lamps checked systematically","Brake lights not verified","Beacon omitted","Failed to use suitable assistance"]},
{id:11,zone:"front",title:"Fuel and oil leaks",prompt:"Did the driver look beneath and around the vehicle for fuel, oil, coolant or other fluid leaks?",quick:["Leak check completed","Did not inspect beneath vehicle","Correctly identified a leak"]},
{id:12,zone:"body",title:"Security of body and wings",prompt:"Did the driver inspect the body, wings, panels, doors, tailgate and attachments for damage and security?",quick:["Body security checked","Damage not identified","Tailgate security omitted"]},
{id:13,zone:"offside",title:"Battery security and condition",prompt:"Did the driver inspect battery security, cover condition, terminals and signs of leakage where safely accessible?",quick:["Battery check completed","Battery security omitted","Unsafe approach to battery check"]},
{id:14,zone:"offside",title:"Diesel exhaust fluid (AdBlue)",prompt:"Did the driver check the AdBlue level or warning indication and inspect for leaks or insecure caps?",quick:["AdBlue check completed","Level or warning not checked","Leak or cap issue missed"]},
{id:15,zone:"offside",title:"Excessive engine exhaust smoke",prompt:"Did the driver observe the exhaust during start-up and identify excessive or unusual smoke?",quick:["Exhaust smoke assessed","Smoke check omitted","Abnormal smoke correctly identified"]},
{id:16,zone:"body",title:"High-voltage emergency cut-off switch",prompt:"Where fitted, did the driver identify the high-voltage cut-off, inspect its condition and explain when it should be used?",quick:["Cut-off identified and understood","Switch not located","Purpose not understood","Not fitted"]},
{id:17,zone:"body",title:"Alternative fuel systems and isolation",prompt:"Where fitted, did the driver inspect visible fuel-system components, warning labels and isolation equipment and demonstrate appropriate awareness?",quick:["Alternative fuel system checked","Isolation point not identified","System not fitted"]},
{id:18,zone:"nearside",title:"Spray suppression",prompt:"Did the driver inspect mudguards, spray-suppression equipment and security around each relevant wheel?",quick:["Spray suppression checked","Damaged flap missed","Security not checked"]},
{id:19,zone:"nearside",title:"Tyres and wheel fixings",prompt:"Did the driver inspect every visible tyre, inner tyre where possible, tread, sidewalls, inflation, wheel nuts and wheel-nut indicators?",quick:["All tyres and wheel fixings checked","Inner tyre omitted","Wheel-nut indicators not checked","Correctly identified tyre defect"]},
{id:20,zone:"nearside",title:"Brake lines and trailer parking brake",prompt:"Did the driver inspect visible brake lines, hoses and connections and, where relevant, the trailer parking brake?",quick:["Brake lines checked","Hose damage missed","Trailer item not applicable"]},
{id:21,zone:"nearside",title:"Electrical connections",prompt:"Did the driver inspect visible electrical connections, sockets and cables for security and damage?",quick:["Electrical connections checked","Damaged cable missed","Not applicable"]},
{id:22,zone:"nearside",title:"Coupling security",prompt:"Where relevant, did the driver check coupling engagement, locking devices, safety clips, landing legs and associated security?",quick:["Coupling check completed","Locking device not checked","Rigid vehicle: not applicable"]},
{id:23,zone:"body",title:"Security of load",prompt:"Did the driver assess whether the load, waste body, doors, sheets, nets and loose equipment were secure before movement?",quick:["Load security confirmed","Loose equipment not identified","Body or door security omitted"]},
{id:24,zone:"rear",title:"Number plate",prompt:"Did the driver check that the number plate was present, secure, clean, legible and correctly illuminated?",quick:["Number plate checked","Plate cleanliness omitted","Lamp not checked"]},
{id:25,zone:"rear",title:"Reflectors",prompt:"Did the driver inspect required reflectors for presence, security, damage and cleanliness?",quick:["Reflectors checked","Damaged reflector missed","Cleanliness not checked"]},
{id:26,zone:"rear",title:"Markings and warning plates",prompt:"Did the driver inspect conspicuity markings, warning plates, speed markings and other required vehicle markings?",quick:["Markings checked","Warning plate omitted","Damage or obscuration missed"]},
{id:27,zone:"rear",title:"Other equipment",prompt:"Did the driver inspect other safety-critical equipment fitted to the vehicle and confirm it was secure and serviceable?",quick:["Other equipment checked","Relevant equipment omitted","Correctly identified a defect"]},
{id:28,zone:"rear",title:"Bin lift and lifting equipment",prompt:"Did the driver inspect the bin lift, controls, guards, interlocks and visible lifting components without placing themselves in danger?",quick:["Bin lift inspected safely","Interlock or guard omitted","Unsafe position during check","Defect identified correctly"],waste:true},
{id:29,zone:"rear",title:"Emergency-stop controls",prompt:"Did the driver locate and test or verify the emergency-stop controls in line with local procedure?",quick:["Emergency stops identified","Control omitted","Reset procedure not understood"],waste:true},
{id:30,zone:"body",title:"Compaction body and tailgate",prompt:"Did the driver inspect the compaction body, tailgate locks, seals, visible hydraulics and safe operating condition?",quick:["Body and tailgate checked","Hydraulic leak missed","Tailgate lock omitted"],waste:true},
{id:31,zone:"body",title:"Reversing safety systems",prompt:"Did the driver inspect the reversing camera, alarm, sensors, warning devices and explain the limits of those systems?",quick:["Reversing systems checked","Camera lens not inspected","Alarm or sensor omitted"],waste:true},
{id:32,zone:"body",title:"Crew access and safety equipment",prompt:"Did the driver inspect crew steps, handrails, beacons, fire extinguisher, first-aid kit, spill kit and required PPE?",quick:["Crew and safety equipment checked","Step or handrail omitted","Safety kit not checked"],waste:true}
];
const ZONES={cab:"Inside cab",front:"Front",nearside:"Nearside",rear:"Rear",offside:"Offside",body:"Body and waste equipment"};
if(!A.preDrive)A.preDrive={zone:"cab",items:{}};
function preStatus(id){return A.preDrive.items[id]?.status||"Not assessed"}
function assessedCount(){return WALK.filter(x=>preStatus(x.id)!=="Not assessed").length}
function statusCount(s){return WALK.filter(x=>preStatus(x.id)===s).length}
function zoneDone(z){let x=WALK.filter(i=>i.zone===z);return x.length&&x.every(i=>preStatus(i.id)!=="Not assessed")}
function vehicleDiagram(){return `<div class=vehicle-diagram>
<svg class=vehicle-svg viewBox="0 0 720 360" aria-label="Refuse collection vehicle inspection diagram">
<rect x="125" y="125" width="430" height="130" rx="18" fill="#d9e7eb" stroke="#005a78" stroke-width="5"/>
<path d="M50 165h105v90H65c-18 0-25-14-22-30l7-60z" fill="#c5dce3" stroke="#005a78" stroke-width="5"/>
<rect x="75" y="178" width="58" height="42" rx="6" fill="#8fc1d1"/><rect x="215" y="145" width="285" height="85" rx="10" fill="#eef5f7"/>
<path d="M500 145h55v85h-55z" fill="#b6d1d9"/><circle cx="125" cy="267" r="34" fill="#28343a"/><circle cx="125" cy="267" r="15" fill="#adb9be"/>
<circle cx="470" cy="267" r="34" fill="#28343a"/><circle cx="470" cy="267" r="15" fill="#adb9be"/><circle cx="540" cy="267" r="34" fill="#28343a"/><circle cx="540" cy="267" r="15" fill="#adb9be"/>
<path d="M555 160h78v95h-78z" fill="#bdd3da" stroke="#005a78" stroke-width="5"/><path d="M633 180h38v75h-38z" fill="#a8c5ce" stroke="#005a78" stroke-width="5"/>
<text x="330" y="195" text-anchor="middle" font-size="23" font-weight="800" fill="#005a78">WASTE SERVICES</text>
</svg>
${Object.keys(ZONES).map(z=>`<button class="zone-btn zone-${z==="offside"?"off":z} ${A.preDrive.zone===z?"sel":""} ${zoneDone(z)?"done":""}" onclick="selectZone('${z}')">${ZONES[z]}</button>`).join("")}
</div>`}
function checkSummary(){return `<div class=check-summary>
<div class=stat><strong>${assessedCount()}/${WALK.length}</strong>Assessed</div>
<div class=stat><strong>${statusCount("Competent")}</strong>Competent</div>
<div class=stat><strong>${statusCount("Coaching")}</strong>Coaching</div>
<div class=stat><strong>${statusCount("Omitted")}</strong>Omitted</div>
<div class=stat><strong>${statusCount("Unsatisfactory")}</strong>Unsatisfactory</div>
</div>`}
function checks(){let zone=A.preDrive.zone||"cab",items=WALK.filter(x=>x.zone===zone);let pct=Math.round(assessedCount()/WALK.length*100);return `<div class=card>
<h2>Observed pre-drive inspection</h2>
<p class=muted>Follow the driver around the vehicle. Record whether the <strong>driver carried out each check competently</strong>, rather than simply recording whether the vehicle passed.</p>
${checkSummary()}<div class=progressbar><div class=progressfill style="width:${pct}%"></div></div>
<div class=walkaround-layout>
<div class=vehicle-panel>${vehicleDiagram()}<div class=zone-list>${Object.keys(ZONES).map(z=>`<button class="zone-chip ${zone===z?"sel":""}" onclick="selectZone('${z}')">${ZONES[z]} ${zoneDone(z)?"✓":""}</button>`).join("")}</div>
<div class=guide open style="display:block"><strong>Assessor mode</strong><br>Watch what the driver actually does. Use <em>Item omitted</em> where they walk past a required check. Use notes only where they add value.</div></div>
<div><h3>${ZONES[zone]}</h3><div class=walk-items>${items.map(walkItem).join("")}</div></div>
</div>
<div class=actions><button class=btn onclick=go(1)>Back</button><button class="btn primary" onclick=startAssessment()>Start driving assessment</button></div>
</div>`}
function walkItem(i){let r=A.preDrive.items[i.id]||{},status=r.status||"Not assessed";return `<details class=walk-item ${status==="Not assessed"?"":"completed"} id="walk-${i.id}">
<summary><span class=item-no>${i.id}</span><span class=item-title>${esc(i.title)} ${i.waste?"<small> · Waste Services</small>":""}</span><span class=item-status>${status}</span></summary>
<div class=item-body><div class=observe-prompt><strong>Observe the driver:</strong><br>${esc(i.prompt)}</div>
<div class=status-grid>${["Competent","Coaching","Omitted","Unsatisfactory","Not applicable"].map(s=>`<button data-s="${s}" class="status-btn ${status===s?"sel":""}" onclick="setPreStatus(${i.id},'${s}')">${s==="Omitted"?"Item omitted":s}</button>`).join("")}</div>
<div class=quick-observations>${i.quick.map(x=>`<button onclick="setPreNote(${i.id},'${x.replaceAll("'","\\'")}')">${esc(x)}</button>`).join("")}</div>
<label>Assessor observation<textarea style="min-height:82px" placeholder="Optional note about the driver's inspection technique or an identified defect" onchange="setPreNote(${i.id},this.value)">${esc(r.note||"")}</textarea></label>
<label style="display:flex;gap:8px;align-items:center;margin-top:8px;font-weight:700"><input style="width:auto;margin:0" type=checkbox ${r.defect?"checked":""} onchange="setPreDefect(${i.id},this.checked)"> Driver identified an actual vehicle defect</label>
</div></details>`}
function selectZone(z){A.preDrive.zone=z;save();render()}
function setPreStatus(id,s){A.preDrive.items[id]=A.preDrive.items[id]||{};A.preDrive.items[id].status=s;if(s==="Omitted"&&!A.preDrive.items[id].note){let i=WALK.find(x=>x.id===id);A.preDrive.items[id].note=`Driver omitted the required check of ${i.title.toLowerCase()}.`}save();render();setTimeout(()=>q("#walk-"+id)?.setAttribute("open",""),0)}
function setPreNote(id,n){A.preDrive.items[id]=A.preDrive.items[id]||{};A.preDrive.items[id].note=n;save();render();setTimeout(()=>q("#walk-"+id)?.setAttribute("open",""),0)}
function setPreDefect(id,v){A.preDrive.items[id]=A.preDrive.items[id]||{};A.preDrive.items[id].defect=v;save()}
function preDriveNarrative(){let omitted=WALK.filter(i=>preStatus(i.id)==="Omitted"),coach=WALK.filter(i=>preStatus(i.id)==="Coaching"),unsat=WALK.filter(i=>preStatus(i.id)==="Unsatisfactory"),good=WALK.filter(i=>preStatus(i.id)==="Competent");let parts=[];if(good.length)parts.push(`The driver competently demonstrated ${good.length} observed inspection items.`);if(coach.length)parts.push(`Coaching was required on ${coach.length} item${coach.length===1?"":"s"}: ${coach.map(i=>i.title).join(", ")}.`);if(omitted.length)parts.push(`The driver omitted ${omitted.length} required item${omitted.length===1?"":"s"}: ${omitted.map(i=>i.title).join(", ")}.`);if(unsat.length)parts.push(`${unsat.length} item${unsat.length===1?" was":"s were"} assessed as unsatisfactory: ${unsat.map(i=>i.title).join(", ")}.`);return parts.join(" ")}
function startAssessment(){let missing=WALK.filter(i=>preStatus(i.id)==="Not assessed");if(missing.length&&!confirm(`${missing.length} inspection items remain unassessed. Continue to the driving assessment anyway?`))return;A.start=A.start||Date.now();startGps();go(3)}
function assessment(){return `<div class=card><h2>Driving assessment</h2><div class=assess><div class=grades>${["Positive","Advisory","Minor","Significant","Serious"].map(g=>`<button data-g=${g} class="grade ${A.grade===g?"sel":""}" onclick="A.grade='${g}';save();render()">${g}</button>`).join("")}</div><div><div class=comps>${C.map(c=>`<button class="comp ${A.comp===c?"sel":""}" onclick="A.comp='${c}';save();render()">${c}</button>`).join("")}</div><div class=obsopts>${obsOptions()}</div></div></div></div><div class=card><h3>Recorded observations (${A.obs.length})</h3><div class=obslist>${A.obs.slice().reverse().map((o,i)=>obsCard(o,A.obs.length-i)).join("")||"<p class=muted>No observations yet.</p>"}</div><div class=actions><button class=btn onclick=undo()>Undo</button><button class="btn primary" onclick=finish()>Finish assessment</button></div></div><div class=card><h3>Route snapshot</h3>${map()}</div>`}
function obsOptions(){if(!A.grade||!A.comp)return "<p class=muted>Choose a grade and competency.</p>";let x=O[A.comp]||["Observation recorded","Standard met","Custom note"];return x.map(v=>`<button class=obs onclick="addObs('${v.replaceAll("'","\\'")}')">${v}</button>`).join("")+`<button class=obs onclick=custom()>Custom note…</button>`}
function addObs(t){let p=A.route.at(-1)||{};A.obs.push({grade:A.grade,comp:A.comp,text:t,time:Date.now(),lat:p.lat,lng:p.lng,speed:p.speed});save();render()}
function custom(){let x=prompt("Observation");if(x)addObs(x)}function undo(){A.obs.pop();save();render()}
function obsCard(o,n){return `<div class=obscard><strong>#${n} ${esc(o.comp)} · ${o.grade}</strong><div>${esc(o.text)}</div><div class=meta>${new Date(o.time).toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"})}${o.lat!=null?` · ${o.lat.toFixed(5)}, ${o.lng.toFixed(5)}`:""}${o.speed!=null?` · ${Math.round(o.speed)} mph`:""}</div></div>`}
function finish(){A.end=Date.now();stopGps();draft();go(4)}function draft(){let f=A.obs.filter(o=>o.grade!=="Positive").map(o=>`${o.comp}: ${o.text}`),p=A.obs.filter(o=>o.grade==="Positive").map(o=>o.text);if(!A.report.initial)A.report.initial=`${A.details.driver||"The driver"} completed the eligibility stage before undertaking an observed pre-drive inspection of ${A.details.vehicle||"the allocated vehicle"}. ${preDriveNarrative()} Initial vehicle control, observation and professional approach were then reviewed during the early stages of the drive.`;if(!A.report.coaching)A.report.coaching=f.length?`Coaching was provided in relation to:\n\n• ${f.join("\n• ")}`:"No specific coaching intervention was required.";if(!A.report.progress)A.report.progress=f.length?"The driver was given the opportunity to apply the coaching. Progress and consistency were reviewed during the remainder of the assessment.":"The driver maintained a consistent standard.";if(!A.report.summary)A.report.summary=`The assessment concluded with ${A.obs.length} recorded observations. ${p.length?`Positive performance included ${p.slice(0,3).join(", ")}.`:""} The final recommendation is recorded below.`;save()}
const pts=["Initial assessment","Coaching delivered","Coaching & progress","Summary"];function area(title,key,help){return `<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between"><h3>${title}</h3><button class=btn onclick="q('#g${key}').classList.toggle('open')">💡 Guidance</button></div><textarea onchange="A.report.${key}=this.value;save()">${esc(A.report[key])}</textarea><div id=g${key} class=guide><strong>Things to consider</strong><ul>${help.map(x=>`<li>${x}</li>`).join("")}</ul></div></div>`}
function report(){return `<div class="card noprint"><h2>Report centre</h2><p class=muted>Fully editable until publication. No revision history is retained.</p><div class=stats><div class=stat><strong>${score()}</strong>Score</div><div class=stat><strong>${overall()}</strong>Rating</div><div class=stat><strong>${A.obs.length}</strong>Observations</div><div class=stat><strong>${miles().toFixed(1)}</strong>Miles</div></div><div class=tabs style="margin-top:14px"><button class="tab on" data-t=edit>Written report</button><button class=tab data-t=observations>Observations</button><button class=tab data-t=gps>GPS</button><button class=tab data-t=preview>Preview</button></div><div id=tedit>${area("Initial assessment","initial",["PPE and documentation","Pre-use checks","Initial confidence and control","Professional approach"])}${area("Coaching delivered","coaching",["What was discussed","Why coaching was required","Specific technique demonstrated","Any safety intervention"])}${area("Coaching & progress","progress",["Response to coaching","Improvement demonstrated","Consistency","Further practice required"])}${area("Summary","summary",["Overall standard","Strengths","Development areas","Follow-up action"])}<label>Recommendation<select onchange="A.report.recommendation=this.value;save()">${["Competent","Further coaching","Reassessment required","Not competent"].map(x=>`<option ${A.report.recommendation===x?"selected":""}>${x}</option>`).join("")}</select></label><label>Driver comments<textarea style="min-height:90px" onchange="A.report.comments=this.value;save()">${esc(A.report.comments)}</textarea></label></div><div id=tobservations class=hide>${A.obs.map((o,i)=>`<div class=obscard><select onchange="A.obs[${i}].grade=this.value;save();render()">${["Positive","Advisory","Minor","Significant","Serious"].map(g=>`<option ${o.grade===g?"selected":""}>${g}</option>`).join("")}</select><select onchange="A.obs[${i}].comp=this.value;save()">${C.map(c=>`<option ${o.comp===c?"selected":""}>${c}</option>`).join("")}</select><textarea style="min-height:80px" onchange="A.obs[${i}].text=this.value;save()">${esc(o.text)}</textarea><button class="btn danger" onclick="A.obs.splice(${i},1);save();render()">Delete</button></div>`).join("")}</div><div id=tgps class=hide><label><input type=checkbox ${A.includeGps?"checked":""} onchange="A.includeGps=this.checked;save()"> Include route in report</label><label><input type=checkbox ${A.includeSpeed?"checked":""} onchange="A.includeSpeed=this.checked;save()"> Include speeds</label>${map()}</div><div id=tpreview class=hide>${preview()}</div><div class=actions><button class=btn onclick=go(3)>Back</button><button class="btn primary" onclick=go(5)>Proceed to signatures</button></div></div>`}
function score(){return A.obs.reduce((s,o)=>s+({Positive:0,Advisory:1,Minor:2,Significant:3,Serious:4}[o.grade]||0),0)}function overall(){let s=score();return s<=5?"Very Good":s<=10?"Good":s<=15?"Fair":s<=20?"Poor":"Very Poor"}
function signatures(){return `<div class="card noprint"><h2>Digital signatures</h2><div class=grid><div><h3>Driver signature</h3><p>I acknowledge receipt of the assessment findings and feedback. Signing does not necessarily indicate agreement.</p><div class=sig><canvas id=driver></canvas></div><div class=actions><button class=btn onclick="clearSig('driver')">Clear</button><button class="btn primary" onclick="acceptSig('driver')">Accept</button></div></div><div><h3>Assessor signature</h3><p>I certify that this assessment has been completed fairly and accurately to the best of my knowledge.</p><div class=sig><canvas id=assessor></canvas></div><div class=actions><button class=btn onclick="clearSig('assessor')">Clear</button><button class="btn primary" onclick="acceptSig('assessor')">Accept</button></div></div></div><div class=actions><button class=btn onclick=go(4)>Back</button><button class="btn primary" onclick=publish()>Publish / Save PDF</button></div></div>${preview()}`}
function preview(){let dur=A.start&&A.end?Math.round((A.end-A.start)/60000):0;return `<div class=report>${A.published?"":"<div class=watermark>DRAFT</div>"}<div class=reporthead><div><h2>Driver Competency Assessment</h2><strong>South Ribble Borough Council</strong><br>Waste Services</div><div class=logo>SRBC</div></div><div class=grid><p><b>Driver</b><br>${esc(A.details.driver||"—")}</p><p><b>Employee no.</b><br>${esc(A.details.employee||"—")}</p><p><b>Vehicle</b><br>${esc(A.details.vehicle||"—")}</p><p><b>Registration</b><br>${esc(A.details.registration||"—")}</p><p><b>Assessor</b><br>${esc(A.details.assessor||"—")}</p><p><b>Date</b><br>${esc(A.details.date||"—")}</p></div><div class=stats><div class=stat><strong>${score()}</strong>Score</div><div class=stat><strong>${overall()}</strong>Rating</div><div class=stat><strong>${dur}</strong>Minutes</div><div class=stat><strong>${miles().toFixed(1)}</strong>Miles</div></div>${["initial","coaching","progress","summary"].map((k,i)=>`<h3 style="margin-top:20px">${pts[i]}</h3><p>${esc(A.report[k]).replace(/\n/g,"<br>")}</p>`).join("")}<p><b>Recommendation:</b> ${A.report.recommendation}</p></div><div class=report><div class=reporthead><div><h2>Observed pre-drive inspection</h2><strong>Driver performance against DVSA HGV walkaround items</strong></div><div>Waste Services</div></div>
<p>This section records how the driver carried out the check. It is not a vehicle roadworthiness certificate.</p>
${checkSummary()}
<table class=matrix><tr><th>No.</th><th>Inspection item</th><th>Driver assessment</th><th>Assessor observation</th><th>Defect identified</th></tr>
${WALK.map(i=>{let r=A.preDrive.items[i.id]||{};return `<tr><td>${i.id}</td><td>${esc(i.title)}</td><td>${r.status||"Not assessed"}</td><td>${esc(r.note||"")}</td><td>${r.defect?"Yes":"No"}</td></tr>`}).join("")}</table></div><div class=report><div class=reporthead><h2>Assessment matrix</h2><div>Waste Services</div></div><table class=matrix><tr><th>Competency</th><th>Score</th><th>Grade</th></tr>${C.map(c=>{let x=A.obs.filter(o=>o.comp===c),m=x.length?Math.max(...x.map(o=>({Positive:0,Advisory:1,Minor:2,Significant:3,Serious:4}[o.grade]))):0,g=x.length?x.sort((a,b)=>({Positive:0,Advisory:1,Minor:2,Significant:3,Serious:4}[b.grade])-({Positive:0,Advisory:1,Minor:2,Significant:3,Serious:4}[a.grade]))[0].grade:"Not observed";return `<tr><td>${c}</td><td>${m}</td><td>${g}</td></tr>`}).join("")}</table>${A.includeGps?`<h3 style="margin-top:20px">Assessment route</h3>${map()}`:""}</div><div class=report><div class=reporthead><h2>Detailed observations</h2><div>Waste Services</div></div>${A.obs.map((o,i)=>`<div class=obscard><strong>#${i+1} ${esc(o.comp)} · ${o.grade}</strong><p>${esc(o.text)}</p><div class=meta>${new Date(o.time).toLocaleString()}${o.lat!=null?` · ${o.lat.toFixed(5)}, ${o.lng.toFixed(5)}`:""}${A.includeSpeed&&o.speed!=null?` · ${Math.round(o.speed)} mph`:""}</div></div>`).join("")}<h3 style="margin-top:20px">Driver comments</h3><p>${esc(A.report.comments||"No comments recorded.")}</p><div class=grid><div><h3>Driver signature</h3>${A.sig.driver?`<img src="${A.sig.driver}" style="max-width:100%;height:90px">`:"Not signed"}</div><div><h3>Assessor signature</h3>${A.sig.assessor?`<img src="${A.sig.assessor}" style="max-width:100%;height:90px">`:"Not signed"}</div></div></div>`}
function bounds(){let r=A.route.length?A.route:[{lat:53.70,lng:-2.70},{lat:53.72,lng:-2.67}],la=r.map(p=>p.lat),lo=r.map(p=>p.lng),b={minLa:Math.min(...la),maxLa:Math.max(...la),minLo:Math.min(...lo),maxLo:Math.max(...lo)};if(b.maxLa-b.minLa<.004){b.maxLa+=.002;b.minLa-=.002}if(b.maxLo-b.minLo<.004){b.maxLo+=.002;b.minLo-=.002}return b}function proj(v,a){let b=bounds();return a?90-80*(v-b.minLa)/(b.maxLa-b.minLa):10+80*(v-b.minLo)/(b.maxLo-b.minLo)}function map(){let d=A.route.map((p,i)=>`${i?"L":"M"} ${proj(p.lng,0)} ${proj(p.lat,1)}`).join(" "),pins=A.obs.filter(o=>o.lat!=null).map((o,i)=>`<span class=pin style="left:${proj(o.lng,0)}%;top:${proj(o.lat,1)}%">${i+1}</span>`).join("");return `<div class=map>${d?`<svg class=route viewBox="0 0 100 100" preserveAspectRatio=none><path d="${d}" fill=none stroke="#005a78" stroke-width=1.3 vector-effect=non-scaling-stroke></path></svg>`:""}${pins}</div>`}
function hav(a,b){let R=6371000,r=x=>x*Math.PI/180,d1=r(b.lat-a.lat),d2=r(b.lng-a.lng),q=Math.sin(d1/2)**2+Math.cos(r(a.lat))*Math.cos(r(b.lat))*Math.sin(d2/2)**2;return 2*R*Math.asin(Math.sqrt(q))}function miles(){let x=0;for(let i=1;i<A.route.length;i++)x+=hav(A.route[i-1],A.route[i]);return x*.000621371}
function startGps(){if(A.tracking||!navigator.geolocation)return;A.tracking=true;q("#gps").textContent="GPS connecting";A.watch=navigator.geolocation.watchPosition(p=>{let c=p.coords;A.route.push({lat:c.latitude,lng:c.longitude,speed:c.speed==null?null:c.speed*2.23694,time:p.timestamp});q("#gps").textContent=`GPS · ${c.speed==null?0:Math.round(c.speed*2.23694)} mph`;save()},()=>{A.tracking=false;q("#gps").textContent="GPS unavailable";save()},{enableHighAccuracy:true,maximumAge:1000,timeout:12000});save()}function stopGps(){if(A.watch!=null)navigator.geolocation.clearWatch(A.watch);A.watch=null;A.tracking=false;save();q("#gps").textContent="GPS idle"}
function wire(){document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{document.querySelectorAll(".tab").forEach(x=>x.classList.remove("on"));["edit","observations","gps","preview"].forEach(x=>q("#t"+x)?.classList.add("hide"));t.classList.add("on");q("#t"+t.dataset.t).classList.remove("hide")});setupSig("driver");setupSig("assessor")}
function setupSig(id){const c=q("#"+id);if(!c)return;const ctx=c.getContext("2d");const r=window.devicePixelRatio||1;c.width=c.clientWidth*r;c.height=180*r;ctx.scale(r,r);ctx.lineWidth=2.5;ctx.lineCap="round";if(A.sig[id]){const im=new Image();im.onload=()=>ctx.drawImage(im,0,0,c.clientWidth,180);im.src=A.sig[id]}let d=false;const pt=e=>{const b=c.getBoundingClientRect();return{x:e.clientX-b.left,y:e.clientY-b.top}};c.onpointerdown=e=>{d=true;const p=pt(e);ctx.beginPath();ctx.moveTo(p.x,p.y)};c.onpointermove=e=>{if(d){const p=pt(e);ctx.lineTo(p.x,p.y);ctx.stroke()}};c.onpointerup=c.onpointerleave=()=>{d=false}}
function clearSig(id){A.sig[id]=null;save();render()}function acceptSig(id){A.sig[id]=q("#"+id).toDataURL();save();alert("Signature accepted")}function publish(){A.published=true;save();render();setTimeout(()=>print(),100)}
function sample(){Object.assign(A.details,{driver:"Jordan Taylor",employee:"10482",vehicle:"26t Refuse Collection Vehicle",registration:"PN24 WST",licence:"TAYL804120JT9AB",odometer:"18462"});
A.preDrive={zone:"cab",items:{}};WALK.forEach(i=>A.preDrive.items[i.id]={status:"Competent",note:""});A.preDrive.items[10]={status:"Coaching",note:"Driver required prompting to verify the brake lights using a suitable method."};A.preDrive.items[19]={status:"Omitted",note:"Driver omitted inspection of the inner nearside rear tyre and wheel-nut indicators."};A.preDrive.items[31]={status:"Competent",note:"Reversing camera lens, alarm and proximity sensors checked and limitations explained."};
A.route=[];for(let i=0;i<32;i++)A.route.push({lat:53.710+Math.sin(i/5)*.008+i*.00014,lng:-2.698+i*.0009+Math.cos(i/4)*.002,speed:16+Math.sin(i)*4,time:Date.now()+i*30000});A.obs=[{grade:"Positive",comp:"Safety checks",text:"Pre-use inspection completed methodically overall.",time:Date.now(),...A.route[3]},{grade:"Advisory",comp:"Mirrors",text:"Mirror check was late before moving around a parked vehicle.",time:Date.now()+300000,...A.route[12]},{grade:"Minor",comp:"Planning",text:"Approach to the mini-roundabout became reactive and required late braking.",time:Date.now()+600000,...A.route[21]},{grade:"Positive",comp:"Attitude to road users",text:"Good patience and clearance when passing a cyclist.",time:Date.now()+800000,...A.route[28]}];A.start=Date.now();A.end=Date.now()+42*60000;A.report={initial:"",coaching:"",progress:"",summary:"",recommendation:"Competent",comments:""};draft();save();render()}
render();if("serviceWorker"in navigator)navigator.serviceWorker.register("./service-worker.js?v=2").then(reg=>reg.update()).catch(()=>{});
